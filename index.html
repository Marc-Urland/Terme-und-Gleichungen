<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0a1f">
<title>TermPilot — Terme &amp; Gleichungen · Klasse 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0e1117;
    --bg-1:#151a23;
    --surface:rgba(255,255,255,.04);
    --surface-2:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.09);
    --border-strong:rgba(255,255,255,.16);
    --text:#f2f0ea;
    --text-soft:#c4c0b5;
    --muted:#7d7a70;

    --p1:#a855f7;
    --p2:#ec4899;
    --c1:#22d3ee;
    --gold:#fbbf24;
    --green:#34d399;
    --red:#fb7185;

    /* Mathe-Zeichen: warmweiß mit klarem Kontrast */
    --math-text:#fef6e4;
    --math-bg:rgba(255,255,255,.06);
    --math-border:rgba(255,255,255,.14);
    --op-minus:#ff9b87;   /* klar unterschiedlich vom Plus */
    --op-plus:#7ee3a8;
    --op-times:#ffd77a;
    --op-eq:#c7c0e0;

    --grad-main:linear-gradient(135deg,#a855f7 0%,#ec4899 100%);
    --grad-cool:linear-gradient(135deg,#22d3ee 0%,#3b82f6 100%);
    --grad-gold:linear-gradient(135deg,#fbbf24 0%,#f97316 100%);
    --grad-green:linear-gradient(135deg,#34d399 0%,#10b981 100%);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    /* schlichter, fast neutraler Dark-Mode — nur ein Hauch Farbe oben */
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(168,85,247,.08), transparent 70%),
      linear-gradient(180deg, #0e1117 0%, #11141b 100%);
    background-attachment:fixed;
    color:var(--text);
    font-family:"Outfit",system-ui,-apple-system,sans-serif;
    font-size:16px;
    line-height:1.5;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:780px;margin:0 auto;
    padding:24px 20px 120px;
    padding-top:max(24px,env(safe-area-inset-top));
  }

  /* ============ HEADER ============ */
  header.top{margin-bottom:28px}
  .header-row{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{
    width:44px;height:44px;border-radius:14px;
    background:var(--grad-main);
    display:grid;place-items:center;
    font-weight:800;font-size:22px;color:#fff;
    box-shadow:0 0 30px rgba(168,85,247,.35);
  }
  .logo-text{font-weight:700;font-size:18px;line-height:1.1}
  .logo-text small{
    display:block;font-weight:500;font-size:11px;
    color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    margin-top:2px;
  }
  .streak{
    display:flex;align-items:center;gap:6px;
    background:var(--surface);border:1px solid var(--border);
    padding:8px 14px;border-radius:999px;
    font-weight:600;font-size:14px;
  }

  h1.title{
    font-size:clamp(28px,7vw,40px);
    font-weight:800;line-height:1.05;letter-spacing:-.02em;
    margin:18px 0 6px;
  }
  h1.title .grad{
    background:var(--grad-main);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .subtitle{color:var(--text-soft);font-size:15px;margin:0 0 18px}

  /* ============ Gesamt-Fortschritt ============ */
  .overall-progress{
    background:var(--surface);border:1px solid var(--border);
    border-radius:18px;padding:16px 18px;margin-bottom:24px;
  }
  .overall-progress .row{
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;color:var(--text-soft);margin-bottom:10px;
  }
  .overall-progress .row strong{color:var(--text);font-size:15px;font-weight:700}
  .progress-bar{
    height:8px;background:rgba(255,255,255,.08);
    border-radius:999px;overflow:hidden;
  }
  .progress-bar > span{
    display:block;height:100%;width:0;
    background:var(--grad-main);
    border-radius:999px;
    transition:width .5s ease;
  }

  /* ============ KAPITEL-LISTE ============ */
  .view{display:none}
  .view.active{display:block}

  .section-label{
    font-size:11px;font-weight:600;text-transform:uppercase;
    letter-spacing:.15em;color:var(--muted);
    margin:8px 0 12px;display:flex;align-items:center;gap:10px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--border)}

  .chapter-list{display:flex;flex-direction:column;gap:14px}
  .chapter-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:22px;
    padding:18px 20px;
    cursor:pointer;
    transition:transform .18s ease, border-color .18s, background .18s;
    text-align:left;color:inherit;font:inherit;width:100%;
  }
  .chapter-card:hover{
    transform:translateY(-2px);
    border-color:var(--border-strong);
    background:var(--surface-2);
  }
  .chapter-card:active{transform:translateY(0)}
  .chapter-card .head{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .chapter-card .icon{
    width:48px;height:48px;border-radius:14px;
    background:var(--grad);
    display:grid;place-items:center;
    font-size:24px;flex-shrink:0;
  }
  .chapter-card .meta{flex:1;min-width:0}
  .chapter-card .num{
    font-size:11px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.12em;
  }
  .chapter-card h3{margin:2px 0 0;font-size:18px;font-weight:700;line-height:1.2}
  .chapter-card .arrow{
    color:var(--muted);font-size:20px;flex-shrink:0;
    transition:transform .18s, color .18s;
  }
  .chapter-card:hover .arrow{color:var(--text);transform:translateX(4px)}
  .chapter-card .progress{margin-top:6px}
  .chapter-card .progress-bar{height:6px}
  .chapter-card .progress-bar > span{background:var(--grad)}
  .chapter-card .progress-text{
    font-size:12px;color:var(--text-soft);margin-top:6px;
    display:flex;justify-content:space-between;
  }
  .chapter-card .progress-text .done{color:var(--text);font-weight:600}

  /* ============ KAPITEL-DETAIL ============ */
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--border);
    color:var(--text);font:inherit;font-weight:600;font-size:14px;
    padding:10px 16px;border-radius:999px;cursor:pointer;
    margin-bottom:18px;
    transition:background .18s, transform .12s;
  }
  .back-btn:hover{background:var(--surface-2);transform:translateX(-2px)}

  .chapter-hero{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:24px;margin-bottom:24px;
    position:relative;overflow:hidden;
  }
  .chapter-hero::before{
    content:"";position:absolute;inset:0;
    background:var(--grad);opacity:.10;pointer-events:none;
  }
  .chapter-hero .hero-head{
    display:flex;align-items:center;gap:14px;margin-bottom:14px;
    position:relative;
  }
  .chapter-hero .icon{
    width:56px;height:56px;border-radius:18px;
    background:var(--grad);
    display:grid;place-items:center;
    font-size:28px;flex-shrink:0;
  }
  .chapter-hero .num{
    font-size:11px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.12em;
  }
  .chapter-hero h2{
    margin:2px 0 0;font-size:24px;font-weight:800;line-height:1.15;
    letter-spacing:-.01em;
  }
  .chapter-hero .pages{
    font-size:11px;font-weight:500;color:var(--muted);margin-top:4px;
    font-family:"JetBrains Mono",monospace;
  }
  .chapter-hero .desc{
    position:relative;
    font-size:15px;line-height:1.6;color:var(--text-soft);
  }
  .chapter-hero .desc p{margin:0 0 10px}
  .chapter-hero .desc p:last-child{margin-bottom:0}
  .chapter-hero .desc em{font-style:normal;font-weight:600;color:var(--text)}
  .chapter-hero .desc .math{
    font-family:"JetBrains Mono",monospace;font-size:13.5px;
    background:var(--math-bg);padding:2px 8px;border-radius:6px;
    color:var(--math-text);
    border:1px solid var(--math-border);
    letter-spacing:.02em;
  }

  /* ============ AUFGABEN ============ */
  .tasks-header{
    display:flex;align-items:center;justify-content:space-between;
    margin:24px 0 14px;
  }
  .tasks-header h3{
    margin:0;font-size:18px;font-weight:700;
    display:flex;align-items:center;gap:10px;
  }
  .tasks-header h3 .dot{
    width:8px;height:8px;border-radius:50%;background:var(--grad);
  }
  .tasks-header .counter{
    font-size:13px;color:var(--text-soft);font-weight:600;
    background:var(--surface);border:1px solid var(--border);
    padding:6px 12px;border-radius:999px;
  }

  .task{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:20px;margin-bottom:14px;
    transition:opacity .25s, border-color .25s;
    position:relative;
  }
  .task.locked{
    opacity:.4;pointer-events:none;
  }
  .task.locked::before{
    content:"🔒";position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);font-size:32px;
    z-index:2;
  }
  .task.solved{
    border-color:rgba(52,211,153,.4);
    background:rgba(52,211,153,.05);
  }
  .task.just-solved{animation:pop .4s ease}
  @keyframes pop{
    0%{transform:scale(1)}
    50%{transform:scale(1.015)}
    100%{transform:scale(1)}
  }

  .task-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .task-num{
    width:32px;height:32px;border-radius:10px;
    background:var(--grad);
    display:grid;place-items:center;
    font-weight:800;font-size:15px;color:#fff;
    flex-shrink:0;
  }
  .task.solved .task-num{background:var(--grad-green)}
  .task-kind{
    font-size:11px;font-weight:600;color:var(--text-soft);
    text-transform:uppercase;letter-spacing:.1em;
    background:rgba(255,255,255,.06);padding:4px 10px;border-radius:999px;
    border:1px solid var(--border);
  }
  .task.solved .task-kind::before{content:"✓ ";color:var(--green)}

  .task-body{
    font-size:15.5px;line-height:1.6;color:var(--text);
    margin-bottom:16px;
  }
  .task-body .math{
    font-family:"JetBrains Mono",monospace;font-size:14.5px;font-weight:500;
    background:var(--math-bg);
    color:var(--math-text);
    padding:3px 10px;border-radius:6px;
    border:1px solid var(--math-border);
    white-space:nowrap;
    letter-spacing:.03em;
  }
  /* Operatoren farblich hervorheben — bessere Unterscheidung */
  .task-body .math .op-minus{color:var(--op-minus);font-weight:700}
  .task-body .math .op-plus{color:var(--op-plus);font-weight:700}
  .task-body .math .op-times{color:var(--op-times);font-weight:700;padding:0 1px}
  .task-body .math .op-eq{color:var(--op-eq);font-weight:700;padding:0 2px}
  .task-body em{font-style:normal;font-weight:600;color:var(--gold)}
  .task-body figure{
    margin:14px 0;text-align:center;
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:12px;padding:14px;
  }
  .task-body figure svg{max-width:100%;height:auto}
  .task-body .hint-line{
    display:block;font-size:13px;color:var(--muted);
    margin-top:8px;font-style:italic;
  }

  .answer-area{
    background:rgba(0,0,0,.20);
    border:1px solid var(--border);
    border-radius:14px;padding:14px;
  }
  .answer-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .answer-row + .answer-row{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .answer-row .label{
    font-size:11px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.1em;
    width:100%;margin-bottom:4px;
  }
  .answer-row input[type="text"]{
    flex:1;min-width:140px;
    font-family:"JetBrains Mono",monospace;font-size:16px;font-weight:500;
    background:rgba(255,255,255,.06);
    border:1.5px solid var(--border-strong);
    color:var(--text);
    padding:12px 14px;border-radius:10px;outline:none;
    transition:border-color .15s, background .15s;
  }
  .answer-row input[type="text"]::placeholder{color:var(--muted)}
  .answer-row input[type="text"]:focus{
    border-color:var(--p1);
    background:rgba(168,85,247,.08);
  }
  .answer-row input.bad{
    border-color:var(--red);
    background:rgba(251,113,133,.08);
    animation:shake .35s;
  }
  .answer-row input.good{
    border-color:var(--green);
    background:rgba(52,211,153,.10);
  }
  @keyframes shake{
    0%,100%{transform:none}
    25%{transform:translateX(-5px)}
    75%{transform:translateX(5px)}
  }

  .btn{
    font-family:inherit;font-weight:700;font-size:14px;
    border:none;cursor:pointer;
    padding:12px 18px;border-radius:10px;
    transition:transform .1s, opacity .15s;
    display:inline-flex;align-items:center;gap:6px;
    white-space:nowrap;
  }
  .btn:active{transform:translateY(1px)}
  .btn:disabled{cursor:not-allowed;opacity:.5}

  .btn.check{background:var(--grad-main);color:#fff}
  .btn.tip{
    background:var(--surface-2);color:var(--gold);
    border:1px solid rgba(251,191,36,.3);
  }

  .feedback{
    width:100%;font-size:13px;font-weight:600;margin-top:8px;
    min-height:18px;
  }
  .feedback.ok{color:var(--green)}
  .feedback.bad{color:var(--red)}

  .tip-cooldown{
    width:100%;font-family:"JetBrains Mono",monospace;
    font-size:11px;color:var(--muted);margin-top:4px;
  }

  .tips{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .tip-box{
    background:rgba(251,191,36,.08);
    border:1px solid rgba(251,191,36,.25);
    border-left:3px solid var(--gold);
    padding:12px 14px;border-radius:10px;
    font-size:14px;line-height:1.5;color:var(--text-soft);
    animation:slide-in .25s ease;
  }
  .tip-box .label{
    display:block;font-family:"JetBrains Mono",monospace;font-size:10px;
    color:var(--gold);text-transform:uppercase;letter-spacing:.12em;
    font-weight:700;margin-bottom:4px;
  }
  @keyframes slide-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

  /* ============ Long-Form Hint ============ */
  .long-hint-box{
    margin-top:12px;
    background:rgba(34,211,238,.06);
    border:1px solid rgba(34,211,238,.30);
    border-radius:14px;padding:14px 16px;
    animation:slide-in .25s ease;
  }
  .long-hint-head{
    display:flex;gap:10px;align-items:flex-start;
    font-size:14px;line-height:1.5;color:var(--text-soft);
    margin-bottom:10px;
  }
  .long-hint-head strong{color:var(--text);display:block;margin-bottom:2px}
  .long-hint-icon{font-size:18px;flex-shrink:0}
  .long-hint-box .show-steps{
    background:rgba(34,211,238,.15);
    color:var(--c1);
    border:1px solid rgba(34,211,238,.35);
    font-size:12px;padding:8px 14px;
  }
  .steps-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .step-item{
    display:flex;gap:10px;align-items:flex-start;
    background:rgba(0,0,0,.25);
    padding:10px 12px;border-radius:8px;
    font-size:13.5px;line-height:1.5;color:var(--text-soft);
  }
  .step-num{
    width:22px;height:22px;border-radius:50%;
    background:var(--grad-cool);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:12px;
    flex-shrink:0;
  }

  /* ============ MERKKASTEN ============ */
  .memo{
    margin-top:32px;
    background:rgba(34,211,238,.06);
    border:1px solid rgba(34,211,238,.30);
    border-radius:20px;
    padding:24px;position:relative;
  }
  .memo .badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--grad-cool);color:#fff;
    padding:6px 14px;border-radius:999px;
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    margin-bottom:14px;
  }
  .memo h3{
    margin:0 0 12px;font-size:20px;font-weight:800;
    color:var(--text);letter-spacing:-.01em;
  }
  .memo p{
    margin:0 0 10px;font-size:14.5px;line-height:1.65;
    color:var(--text-soft);
  }
  .memo p strong{color:var(--text);font-weight:700}
  .memo .math{
    font-family:"JetBrains Mono",monospace;font-size:13.5px;font-weight:500;
    background:rgba(0,0,0,.35);
    color:var(--math-text);
    padding:3px 9px;border-radius:6px;
    border:1px solid var(--math-border);
    white-space:nowrap;
    letter-spacing:.03em;
  }
  .memo .math .op-minus{color:var(--op-minus);font-weight:700}
  .memo .math .op-plus{color:var(--op-plus);font-weight:700}
  .memo .math .op-times{color:var(--op-times);font-weight:700;padding:0 1px}
  .memo .math .op-eq{color:var(--op-eq);font-weight:700;padding:0 2px}
  .memo .math-block{
    display:block;font-family:"JetBrains Mono",monospace;font-size:13.5px;
    background:rgba(0,0,0,.40);color:var(--math-text);
    padding:14px 16px;border-radius:10px;margin:10px 0;
    white-space:pre-wrap;line-height:1.75;
    border-left:3px solid var(--math-border);
    letter-spacing:.03em;
  }
  .memo ol, .memo ul{
    margin:8px 0;padding-left:22px;color:var(--text-soft);
  }
  .memo li{margin-bottom:6px;font-size:14.5px;line-height:1.6}
  .memo em{font-style:normal;font-weight:600;color:var(--gold)}

  /* ============ ABSCHLUSS-BANNER ============ */
  .complete-banner{
    margin-top:24px;
    background:var(--grad-green);
    border-radius:20px;padding:24px;text-align:center;
    color:#fff;display:none;
    animation:bounce-in .5s cubic-bezier(.34,1.56,.64,1);
  }
  .complete-banner.show{display:block}
  .complete-banner .emoji{font-size:42px;display:block;margin-bottom:8px}
  .complete-banner h4{
    margin:0 0 6px;font-size:22px;font-weight:800;letter-spacing:-.01em;
  }
  .complete-banner p{margin:0;font-size:14px;opacity:.92}
  @keyframes bounce-in{
    0%{opacity:0;transform:scale(.9)}
    60%{opacity:1;transform:scale(1.02)}
    100%{transform:scale(1)}
  }

  /* ============ Test-Auswertung ============ */
  .test-result{margin-top:18px}
  .test-summary{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;padding:28px 24px;
    text-align:center;
    animation:bounce-in .5s cubic-bezier(.34,1.56,.64,1);
  }
  .ts-emoji{font-size:54px;margin-bottom:8px}
  .ts-score{
    font-size:42px;font-weight:800;line-height:1;
    background:var(--grad-gold);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .ts-pct{
    font-family:"JetBrains Mono",monospace;font-size:14px;
    color:var(--text-soft);margin-top:6px;
  }
  .ts-label{
    margin-top:12px;font-size:16px;font-weight:600;color:var(--text);
  }
  .ts-wrong{
    margin-top:20px;padding-top:18px;border-top:1px solid var(--border);
    text-align:left;font-size:14px;color:var(--text-soft);
  }
  .ts-wrong strong{color:var(--text);display:block;margin-bottom:8px}
  .ts-wrong ul{margin:0;padding-left:20px}
  .ts-wrong li{margin-bottom:4px}
  .ts-wrong em{color:var(--gold);font-style:normal;font-weight:600}

  .submit-test{
    width:100%;margin-top:18px;padding:18px;
    font-size:16px;border-radius:14px;
    background:var(--grad-gold);color:#1b1b1b;font-weight:800;
  }

  /* ============ Confetti (Canvas) ============ */
  #confetti-canvas{
    position:fixed;inset:0;pointer-events:none;z-index:9999;
  }

  footer{
    margin-top:48px;text-align:center;
    font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.12em;font-weight:500;
  }

  @media (max-width:480px){
    .wrap{padding:18px 14px 100px}
    h1.title{font-size:26px}
    .chapter-hero{padding:20px}
    .chapter-hero h2{font-size:20px}
    .task{padding:16px}
    .memo{padding:20px}
    .answer-row input[type="text"]{font-size:15px;padding:11px 12px}
    .btn{padding:11px 14px;font-size:13px}
  }
</style>

<script>
'use strict';

/* =====================================================================
   ANTWORT-PRÜFUNG: Term-Auswerter & Vergleich
   ===================================================================== */
function normalize(str){
  if(str==null) return '';
  let s = String(str).toLowerCase().trim();
  s = s.replace(/[\u2212\u2013\u2014]/g,'-');
  s = s.replace(/[\u00b7\u00d7]/g,'*');
  s = s.replace(/,/g,'.');
  s = s.replace(/\s+/g,'');
  return s;
}

function parseNumberLike(s){
  s = normalize(s);
  s = s.replace(/^\((-?\d+(?:\.\d+)?)\)$/, '$1');
  if(/^-?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
  const m = s.match(/^(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)$/);
  if(m){
    const den = parseFloat(m[2]);
    if(den === 0) return null;
    return parseFloat(m[1])/den;
  }
  return null;
}

function tokenize(src, varNames){
  const s = normalize(src);
  const tokens = [];
  let i = 0;
  while(i < s.length){
    const c = s[i];
    if('+-*/()'.indexOf(c) >= 0){tokens.push({t:c}); i++; continue}
    if(/\d/.test(c) || (c==='.' && /\d/.test(s[i+1]))){
      let j = i;
      while(j < s.length && /[\d.]/.test(s[j])) j++;
      tokens.push({t:'num', v:parseFloat(s.slice(i,j))});
      i = j; continue;
    }
    if(/[a-z]/.test(c)){
      let j = i;
      while(j < s.length && /[a-z]/.test(s[j])) j++;
      const name = s.slice(i,j);
      if(varNames.indexOf(name) >= 0){
        tokens.push({t:'var', v:name});
        i = j; continue;
      }
      return null;
    }
    return null;
  }
  const out = [];
  for(let k = 0; k < tokens.length; k++){
    const cur = tokens[k];
    if(k > 0){
      const prev = tokens[k-1];
      const prevEndsValue = (prev.t==='num'||prev.t==='var'||prev.t===')');
      const curStartsValue = (cur.t==='num'||cur.t==='var'||cur.t==='(');
      if(prevEndsValue && curStartsValue) out.push({t:'*'});
    }
    out.push(cur);
  }
  return out;
}

function evalTerm(src, env, varNames){
  const tokens = tokenize(src, varNames);
  if(!tokens) return null;
  let pos = 0;
  function peek(){return tokens[pos]}
  function eat(t){const tk = tokens[pos]; if(!tk||tk.t!==t) return null; pos++; return tk}
  function parseExpr(){
    let v = parseTerm();
    if(v===null) return null;
    while(peek() && (peek().t==='+'||peek().t==='-')){
      const op = peek().t; pos++;
      const r = parseTerm();
      if(r===null) return null;
      v = (op==='+') ? v+r : v-r;
    }
    return v;
  }
  function parseTerm(){
    let v = parseFactor();
    if(v===null) return null;
    while(peek() && (peek().t==='*'||peek().t==='/')){
      const op = peek().t; pos++;
      const r = parseFactor();
      if(r===null) return null;
      if(op==='*') v = v*r;
      else { if(r===0) return null; v = v/r; }
    }
    return v;
  }
  function parseFactor(){
    let sign = 1;
    while(peek() && (peek().t==='+'||peek().t==='-')){
      if(peek().t==='-') sign = -sign;
      pos++;
    }
    const v = parsePrimary();
    if(v===null) return null;
    return sign*v;
  }
  function parsePrimary(){
    const tk = peek();
    if(!tk) return null;
    if(tk.t==='num'){pos++; return tk.v}
    if(tk.t==='var'){pos++; return env[tk.v] != null ? env[tk.v] : 0}
    if(tk.t==='('){
      pos++;
      const v = parseExpr();
      if(v===null) return null;
      if(!eat(')')) return null;
      return v;
    }
    return null;
  }
  const result = parseExpr();
  if(pos !== tokens.length) return null;
  return result;
}

function termsEquivalent(input, expected, varNames){
  const testValues = [0, 1, 2, 3, -1, -2, 0.5, 7, -3.5, 4.25];
  for(let i = 0; i < testValues.length; i++){
    const env = {};
    for(let k = 0; k < varNames.length; k++){
      env[varNames[k]] = testValues[(i+k) % testValues.length];
    }
    const a = evalTerm(input, env, varNames);
    const b = evalTerm(expected, env, varNames);
    if(a===null || b===null) return false;
    if(Math.abs(a - b) > 1e-9) return false;
  }
  return true;
}

/* Extrahiert alle Buchstabenfolgen, die in src als Variable verwendet werden
   (also nicht direkt Teil eines Schlüsselwortes wie 'ja' sind).
   Gibt eine sortierte Liste eindeutiger Namen zurück. */
function extractVarNames(src){
  const s = normalize(src);
  const matches = s.match(/[a-z]+/g);
  if(!matches) return [];
  const set = {};
  for(let i = 0; i < matches.length; i++) set[matches[i]] = true;
  return Object.keys(set);
}

/* Versucht Term-Äquivalenz auch dann zu bestätigen, wenn die SuS einen anderen
   Variablennamen verwendet haben (z.B. x statt w). Das funktioniert nur, wenn
   die Anzahl der verwendeten "Variablen" zu der erwarteten passt. */
function termsEquivalentFlexible(input, expected, expectedVars){
  // 1. Direkter Versuch
  if(termsEquivalent(input, expected, expectedVars)) return true;
  // 2. Variablen aus der Eingabe extrahieren
  const inputVars = extractVarNames(input);
  if(inputVars.length === 0) return false;
  // Falls zu viele Variablen im Input vorkommen → keine Umbenennung möglich
  if(inputVars.length !== expectedVars.length) return false;
  // 3. Umbenennen: jede inputVar → entsprechende expectedVar
  // Bei einer Variable ist die Zuordnung eindeutig
  if(expectedVars.length === 1){
    const from = inputVars[0];
    const to = expectedVars[0];
    if(from === to) return false; // schon getestet
    // Ersetze in input alle Vorkommen von 'from' durch 'to'
    const renamed = renameVariable(input, from, to);
    return termsEquivalent(renamed, expected, expectedVars);
  }
  // Bei mehreren Variablen: alle Permutationen probieren (selten gebraucht)
  const perms = permutations(inputVars);
  for(let p = 0; p < perms.length; p++){
    let renamed = input;
    // Mehrstufiges Umbenennen über Platzhalter, damit Tausch funktioniert
    for(let k = 0; k < perms[p].length; k++){
      renamed = renameVariable(renamed, perms[p][k], '__v'+k+'__');
    }
    for(let k = 0; k < expectedVars.length; k++){
      renamed = renamed.replace(new RegExp('__v'+k+'__','g'), expectedVars[k]);
    }
    if(termsEquivalent(renamed, expected, expectedVars)) return true;
  }
  return false;
}

function renameVariable(src, from, to){
  // Ersetze nur ganze Wort-Vorkommen
  const re = new RegExp('(^|[^a-z])' + from + '(?![a-z])', 'g');
  return src.replace(re, '$1' + to);
}

function permutations(arr){
  if(arr.length <= 1) return [arr];
  const out = [];
  for(let i = 0; i < arr.length; i++){
    const rest = arr.slice(0,i).concat(arr.slice(i+1));
    const subs = permutations(rest);
    for(let j = 0; j < subs.length; j++) out.push([arr[i]].concat(subs[j]));
  }
  return out;
}

function isLongForm(input, varNames){
  const s = normalize(input);
  for(let i = 0; i < varNames.length; i++){
    const v = varNames[i];
    const re = new RegExp('(^|[+\\-*/(])' + v + '(?=$|[+\\-*/)])','g');
    const matches = s.match(re);
    if(matches && matches.length >= 2) return true;
  }
  const numSums = s.match(/(?:^|[+\-])\d+(?:\.\d+)?(?=[+\-]|$)/g);
  if(numSums && numSums.length >= 3) return true;
  return false;
}

function checkAnswer(input, expected){
  const u = normalize(input);
  if(!u) return {ok:false};

  if(typeof expected === 'string'){
    if(normalize(expected) === u) return {ok:true};
    const a = parseNumberLike(input);
    const b = parseNumberLike(expected);
    if(a!==null && b!==null && Math.abs(a-b) < 1e-6) return {ok:true};
    return {ok:false};
  }

  if(Array.isArray(expected)){
    for(let i = 0; i < expected.length; i++){
      if(normalize(expected[i]) === u) return {ok:true};
    }
    const a = parseNumberLike(input);
    if(a !== null){
      for(let i = 0; i < expected.length; i++){
        const b = parseNumberLike(expected[i]);
        if(b !== null && Math.abs(a-b) < 1e-6) return {ok:true};
      }
    }
    return {ok:false};
  }

  if(expected && typeof expected === 'object'){
    if('num' in expected){
      const v = parseNumberLike(input);
      if(v===null) return {ok:false};
      return {ok: Math.abs(v - expected.num) < 1e-6};
    }
    if('term' in expected){
      const vars = expected.vars || ['x'];
      // Sonderfall: Eingabe enthält "=" → als Gleichung interpretieren
      // Beispiel: erwartet "n+3", User schreibt "x=n+3" oder "x-3=n"
      // Wir prüfen, ob (lhs)-(rhs) bzw. (rhs)-(lhs) zu (extraVar)-(expected.term) äquivalent ist.
      if(input.indexOf('=') >= 0){
        const parts = input.split('=');
        if(parts.length === 2 && parts[0].trim() && parts[1].trim()){
          const inputVars = extractVarNames(input);
          const extraVars = inputVars.filter(v => vars.indexOf(v) < 0);
          const lhs = parts[0], rhs = parts[1];
          const c1 = `(${lhs})-(${rhs})`;
          const c2 = `(${rhs})-(${lhs})`;

          // Fall A: User hat die Original-Variable verwendet, plus eine "neue Größe" (extraVars=[neueGröße])
          if(extraVars.length <= 1){
            const allVars = vars.concat(extraVars);
            const target = extraVars.length === 1
              ? `(${extraVars[0]})-(${expected.term})`
              : `0-(${expected.term})`;
            if(termsEquivalentFlexible(c1, target, allVars) ||
               termsEquivalentFlexible(c2, target, allVars)){
              return {ok:true};
            }
            return {ok:false};
          }

          // Fall B: User hat zwei "fremde" Variablen verwendet — eine ist die umbenannte
          // Hauptvariable, die andere die "neue Größe". Beide Zuordnungen probieren.
          if(extraVars.length === 2 && vars.length === 1){
            for(let pick = 0; pick < 2; pick++){
              const mainSubst = extraVars[pick];        // wird zu vars[0]
              const newSize  = extraVars[1-pick];        // ist die "neue Größe"
              // Eingabe umbenennen: mainSubst → vars[0]
              const renLhs = renameVariable(lhs, mainSubst, vars[0]);
              const renRhs = renameVariable(rhs, mainSubst, vars[0]);
              const allVars = [vars[0], newSize];
              const target = `(${newSize})-(${expected.term})`;
              const cc1 = `(${renLhs})-(${renRhs})`;
              const cc2 = `(${renRhs})-(${renLhs})`;
              if(termsEquivalent(cc1, target, allVars) ||
                 termsEquivalent(cc2, target, allVars)){
                return {ok:true};
              }
            }
            return {ok:false};
          }
          return {ok:false};
        }
      }
      if(!termsEquivalentFlexible(input, expected.term, vars)) return {ok:false};
      const isLong = isLongForm(input, extractVarNames(input).length ? extractVarNames(input) : vars);
      const compactNorm = normalize(expected.compact || expected.term);
      // Beim Vergleich für "kompakt" auch flexibel: input umbenannt → kompakt vergleichen
      let userNorm = u;
      const inputVars = extractVarNames(input);
      if(inputVars.length === vars.length && inputVars.length === 1 && inputVars[0] !== vars[0]){
        userNorm = normalize(renameVariable(input, inputVars[0], vars[0]));
      }
      if(isLong && userNorm !== compactNorm){
        return {ok:true, longHint:true, compact: expected.compact || expected.term, steps: expected.steps};
      }
      return {ok:true};
    }
    if('any' in expected){
      for(let i = 0; i < expected.any.length; i++){
        const r = checkAnswer(input, expected.any[i]);
        if(r.ok) return r;
      }
      return {ok:false};
    }
  }
  return {ok:false};
}

    <h3>Distributivgesetz: Ausmultiplizieren &amp; Ausklammern</h3>
    <p><strong>Ausmultiplizieren</strong> (Klammer auflösen): Jeder Summand in der Klammer wird mit
    dem Faktor multipliziert.</p>
    <span class="math-block">a · (b + c) = a·b + a·c
4 · (3·x − 5) = 4·3·x − 4·5 = 12·x − 20</span>
    <p><strong>Ausklammern</strong> (umgekehrte Richtung): Den gemeinsamen Faktor aus jedem Summanden
    herausziehen.</p>
    <span class="math-block">12·x − 24 = 12·(x − 2)
6·x + 9 = 3·(2·x + 3)</span>
    <p><strong>Minusklammer-Regel:</strong> Ein Minus vor der Klammer dreht <em>jedes</em> Vorzeichen
    in der Klammer um.</p>
    <span class="math-block">−(4·x + 5) = −4·x − 5
7 − (3·x − 3) = 7 − 3·x + 3 = 10 − 3·x</span>
    <p><strong>Vorgehen beim Vereinfachen mit Klammern:</strong></p>
    <ol>
      <li>Klammern auflösen (ausmultiplizieren).</li>
      <li>Summanden mit und ohne Variable ordnen.</li>
      <li>Zusammenfassen.</li>
    </ol>
  `
},

/* =====================================================================
   Operator-Highlighting: macht −, +, · und = in allen .math-Elementen
   farblich klar unterscheidbar. Läuft einmal nach jedem Render.
   ===================================================================== */
function highlightMath(root){
  const els = root.querySelectorAll('.math');
  for(let i = 0; i < els.length; i++){
    const el = els[i];
    if(el.dataset.hi) continue;
    const text = el.textContent;
    let html = '';
    for(let k = 0; k < text.length; k++){
      const ch = text[k];
      if(ch === '−' || ch === '-'){
        html += '<span class="op-minus">' + ch + '</span>';
      } else if(ch === '+'){
        html += '<span class="op-plus">' + ch + '</span>';
      } else if(ch === '·' || ch === '*'){
        html += '<span class="op-times">' + ch + '</span>';
      } else if(ch === '='){
        html += '<span class="op-eq">' + ch + '</span>';
      } else if(ch === '<' || ch === '>' || ch === '&'){
        html += ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : '&amp;';
      } else {
        html += ch;
      }
    }
    el.innerHTML = html;
    el.dataset.hi = '1';
  }
}

/* =====================================================================
   STATE
   ===================================================================== */
const TIP_COOLDOWN_MS = 3 * 60 * 1000;
const state = {};
let streak = 0;
let currentChapterId = null;

CHAPTERS.forEach(c => { state[c.id] = { solved:new Set(), tipState:{}, answers:{} }; });
const totalTasks = CHAPTERS.reduce((s,c) => s + c.tasks.length, 0);

/* =====================================================================
   GLOBAL TIMER (ein Interval für alle Cooldowns, nur wenn Kapitel offen)
   ===================================================================== */
let globalTimer = null;
function startGlobalTimer(){
  if(globalTimer) return;
  globalTimer = setInterval(updateAllCooldowns, 1000);
}
function stopGlobalTimer(){
  if(globalTimer){clearInterval(globalTimer); globalTimer=null}
}
function updateAllCooldowns(){
  if(!currentChapterId) return;
  const tipState = state[currentChapterId].tipState;
  const now = Date.now();
  let anyActive = false;
  for(const idx in tipState){
    const ts = tipState[idx];
    if(ts.tipIndex >= ts.totalTips) continue;
    const remaining = Math.max(0, ts.lastTipTime + TIP_COOLDOWN_MS - now);
    const labelEl = document.querySelector(`#task-${idx} .tip-cooldown`);
    const btnEl = document.querySelector(`#task-${idx} .btn.tip`);
    if(!labelEl || !btnEl) continue;
    if(remaining > 0){
      anyActive = true;
      btnEl.disabled = true;
      const m = Math.floor(remaining/60000);
      const s = Math.floor((remaining%60000)/1000);
      labelEl.textContent = `nächster Tipp in ${m}:${String(s).padStart(2,'0')}`;
    } else {
      btnEl.disabled = false;
      labelEl.textContent = '';
    }
  }
  if(!anyActive) stopGlobalTimer();
}

function buildHome(){
  document.getElementById('overall-total').textContent = totalTasks;
  const listEl = document.getElementById('chapter-list');
  // Einmaliges Rendering — keine teuren Operationen pro Frame
  let html = '';
  for(let i = 0; i < CHAPTERS.length; i++){
    const c = CHAPTERS[i];
    html += `<button class="chapter-card" data-id="${c.id}" style="--grad:${c.grad}">
      <div class="head">
        <div class="icon">${c.icon}</div>
        <div class="meta">
          <div class="num">${c.isTest ? 'Abschluss' : 'Station '+(i+1)}</div>
          <h3>${c.title}</h3>
        </div>
        <div class="arrow">→</div>
      </div>
      <div class="progress">
        <div class="progress-bar"><span data-bar="${c.id}"></span></div>
        <div class="progress-text">
          <span><span class="done" data-done="${c.id}">0</span> von ${c.tasks.length} gelöst</span>
          <span data-pct="${c.id}">0%</span>
        </div>
      </div>
    </button>`;
  }
  listEl.innerHTML = html;
  // Ein Event-Delegate
  listEl.addEventListener('click', e => {
    const card = e.target.closest('.chapter-card');
    if(card) openChapter(card.dataset.id);
  });
  refreshHomeProgress();
}

function refreshHomeProgress(){
  let done = 0;
  for(let i = 0; i < CHAPTERS.length; i++){
    const c = CHAPTERS[i];
    const d = state[c.id].solved.size;
    done += d;
    const pct = Math.round(d / c.tasks.length * 100);
    const doneEl = document.querySelector(`[data-done="${c.id}"]`);
    const barEl = document.querySelector(`[data-bar="${c.id}"]`);
    const pctEl = document.querySelector(`[data-pct="${c.id}"]`);
    if(doneEl) doneEl.textContent = d;
    if(barEl) barEl.style.width = pct + '%';
    if(pctEl) pctEl.textContent = pct + '%';
  }
  document.getElementById('overall-done').textContent = done;
  document.getElementById('overall-bar').style.width = (done/totalTasks*100) + '%';
  document.getElementById('streak-count').textContent = streak;
}

  for(let ti = 0; ti < c.tasks.length; ti++){
    const t = c.tasks[ti];

    const isSolved = !isTest && state[id].solved.has(ti);

    const controlsHtml = isTest ? '' : `

    const cooldownHtml = isTest ? '' : '<div class="tip-cooldown"></div>';
    const tipsContainerHtml = isTest ? '' : '<div class="tips"></div>';

    const savedAnswer = state[id].answers[ti];
    const savedAttr = isSolved && savedAnswer ? ` value="${savedAnswer.replace(/"/g,'&quot;')}"` : '';

    tasksHtml += `<div class="${cls}" id="task-${ti}" data-idx="${ti}" style="--grad:${c.grad}">
      <div class="task-head">
        <div class="task-num">${ti+1}</div>
        <div class="task-kind">${t.kind}</div>
      </div>
      <div class="task-body">${t.body}</div>
      <div class="answer-area">
        ${equationHtml}
        <div class="answer-row">
          <span class="label">${t.equation ? 'Dein Ergebnis (Wert der Variablen)' : 'Dein Ergebnis'}</span>
          <input type="text" class="ans-input${isSolved?' good':''}" placeholder="hier eintippen…" autocomplete="off" spellcheck="false"${savedAttr} ${isSolved?'disabled':''}>

          <div class="feedback${isSolved?' ok':''}">${isSolved?'✓ Richtig! Stark gemacht.':''}</div>
          ${cooldownHtml}

        <div class="long-hint"></div>
        ${tipsContainerHtml}
      </div>
    </div>`;
  }

  document.getElementById('chapter-content').innerHTML = `
    <div class="chapter-hero" style="--grad:${c.grad}">
      <div class="hero-head">
        <div class="icon">${c.icon}</div>
        <div>

          <h2>${c.title}</h2>
          <div class="pages">${c.pages}</div>
        </div>
      </div>
      <div class="desc">${c.description}</div>
    </div>

    <div class="tasks-header">
      <h3><span class="dot" style="background:${c.grad}"></span>${isTest ? 'Test-Aufgaben' : 'Aufgaben'}</h3>
      <div class="counter"><span id="ch-counter">${state[id].solved.size}</span> / ${c.tasks.length}</div>
    </div>

    <div class="task-list" id="task-list">${tasksHtml}</div>

    ${isTest ? `
      <button class="btn check submit-test" id="submit-test">✅ Test abgeben &amp; auswerten</button>
      <div class="test-result" id="test-result"></div>
    ` : ''}

    <div class="complete-banner" id="complete-banner">
      <span class="emoji">🎉</span>
      <h4>${isTest ? 'Test abgeschlossen!' : 'Station gemeistert!'}</h4>
      <p>${isTest ? 'Sieh dir dein Ergebnis an und schau, was du nochmal vertiefen kannst.' : 'Alle Aufgaben gelöst. Schau dir den Merkkasten unten an.'}</p>
    </div>

    <div class="memo">
      <span class="badge">${isTest ? '🎓 Geschafft' : '📌 Merken'}</span>
      ${c.memo}
    </div>
  `;

  // EIN Event-Delegate für die ganze Task-Liste — viel schneller als pro Aufgabe
  const listEl = document.getElementById('task-list');
  listEl.addEventListener('click', e => handleTaskClick(e, id, c, isTest));
  listEl.addEventListener('keydown', e => {
    if(e.key !== 'Enter') return;
    if(e.target.classList.contains('ans-input')){
      e.preventDefault();
      if(!isTest){
        const taskEl = e.target.closest('.task');
        if(taskEl) doCheckTask(taskEl, id, c);
      }
    } else if(e.target.classList.contains('eq-input')){
      e.preventDefault();
      const taskEl = e.target.closest('.task');
      if(taskEl) doCheckEquation(taskEl, c);
    }
  });

  if(isTest){
    document.getElementById('submit-test').addEventListener('click', () => submitTest(id, c));
  }

  // Operatoren in allen .math-Elementen farblich hervorheben
  highlightMath(document.getElementById('chapter-content'));

  // View wechseln
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-chapter').classList.add('active');
  window.scrollTo({top:0});

function handleTaskClick(e, id, c, isTest){
  const target = e.target;
  if(target.classList.contains('check') && !target.classList.contains('submit-test')){
    const taskEl = target.closest('.task');
    if(taskEl) doCheckTask(taskEl, id, c);
    return;
  }
  if(target.classList.contains('eq-check')){
    const taskEl = target.closest('.task');
    if(taskEl) doCheckEquation(taskEl, c);
    return;
  }
  if(target.classList.contains('tip') && !target.classList.contains('eq-check')){
    const taskEl = target.closest('.task');
    if(taskEl) showTip(taskEl, id, c);
    return;
  }
  if(target.classList.contains('show-steps')){
    const hint = target.closest('.long-hint-box');
    const stepsList = hint.querySelector('.steps-list');
    if(stepsList.hasAttribute('hidden')){
      stepsList.removeAttribute('hidden');
      target.textContent = 'Schritte ausblenden';
    } else {
      stepsList.setAttribute('hidden','');
      target.textContent = 'Schritte anzeigen';
    }
    return;
  }
}

function doCheckEquation(taskEl, c){
  const ti = parseInt(taskEl.dataset.idx, 10);
  const t = c.tasks[ti];
  if(!t.equation) return;
  const eqInput = taskEl.querySelector('.eq-input');
  const eqFb = taskEl.querySelector('.eq-feedback');
  const val = eqInput.value.trim();
  if(!val){
    eqFb.textContent = 'Bitte trage eine Gleichung ein.';
    eqFb.className = 'feedback eq-feedback bad';
    return;
  }
  if(val.indexOf('=') < 0){
    eqFb.textContent = 'Eine Gleichung braucht ein "=" Zeichen.';
    eqFb.className = 'feedback eq-feedback bad';
    eqInput.classList.add('bad');
    return;
  }
  const parts = val.split('=');
  const lhs = parts[0], rhs = parts[1];
  const combined = `(${lhs})-(${rhs})`;
  const flipped = `(${rhs})-(${lhs})`;
  const vars = t.equation.answer.vars;
  if(termsEquivalentFlexible(combined, t.equation.answer.term, vars) ||
     termsEquivalentFlexible(flipped, t.equation.answer.term, vars)){
    eqFb.textContent = '✓ Gleichung ist richtig!';
    eqFb.className = 'feedback eq-feedback ok';
    eqInput.classList.remove('bad');
    eqInput.classList.add('good');
  } else {
    eqFb.textContent = 'Die Gleichung passt noch nicht. Schau nochmal: was ist gleich viel?';
    eqFb.className = 'feedback eq-feedback bad';
    eqInput.classList.add('bad');
    eqInput.classList.remove('good');
  }
}

function showTip(taskEl, id, c){
  const ti = parseInt(taskEl.dataset.idx, 10);
  const t = c.tasks[ti];
  if(!t.tips) return;

  // Tip-State pro Aufgabe initialisieren
  if(!state[id].tipState[ti]){
    state[id].tipState[ti] = { tipIndex:0, lastTipTime:0, totalTips:t.tips.length };
  }
  const ts = state[id].tipState[ti];
  if(ts.tipIndex >= ts.totalTips) return;
  const now = Date.now();
  if(ts.tipIndex > 0 && now - ts.lastTipTime < TIP_COOLDOWN_MS) return;

  const tipsEl = taskEl.querySelector('.tips');
  const box = document.createElement('div');
  box.className = 'tip-box';
  box.innerHTML = `<span class="label">Tipp ${ts.tipIndex+1}</span>${t.tips[ts.tipIndex]}`;
  tipsEl.appendChild(box);
  ts.tipIndex++;
  ts.lastTipTime = now;

  const cooldownLabel = taskEl.querySelector('.tip-cooldown');
  const tipBtn = taskEl.querySelector('.btn.tip:not(.eq-check)');
  if(ts.tipIndex >= ts.totalTips){
    tipBtn.disabled = true;
    cooldownLabel.textContent = 'alle Tipps gezeigt';
  } else {
    tipBtn.disabled = true;
    cooldownLabel.textContent = `nächster Tipp in 3:00`;
    startGlobalTimer();
  }
}

function doCheckTask(taskEl, id, c){
  const ti = parseInt(taskEl.dataset.idx, 10);
  const t = c.tasks[ti];
  const input = taskEl.querySelector('.ans-input');
  const feedback = taskEl.querySelector('.feedback:not(.eq-feedback)');
  const val = input.value;
  if(!val.trim()) return;
  input.classList.remove('good','bad');
  const result = checkAnswer(val, t.answer);
  if(result.ok){
    input.classList.add('good');
    input.disabled = true;
    const checkBtn = taskEl.querySelector('.btn.check');
    if(checkBtn) checkBtn.disabled = true;
    feedback.textContent = '✓ Richtig! Stark gemacht.';
    feedback.className = 'feedback ok';
    taskEl.classList.add('solved','just-solved');
    state[id].solved.add(ti);
    state[id].answers[ti] = val;
    streak++;
    document.getElementById('ch-counter').textContent = state[id].solved.size;
    refreshHomeProgress();
    confettiBurst(taskEl);

    // Long-Hint anzeigen
    if(result.longHint && result.steps){
      const longHintEl = taskEl.querySelector('.long-hint');
      const stepsHtml = result.steps.map((s,i) =>
        `<div class="step-item"><span class="step-num">${i+1}</span><span>${s}</span></div>`
      ).join('');
      longHintEl.innerHTML = `<div class="long-hint-box">
        <div class="long-hint-head">
          <span class="long-hint-icon">✨</span>
          <span><strong>Richtig — kann man das noch kompakter schreiben?</strong><br>
          Du hast es ausführlich angegeben. Die kürzere Form lautet:
          <span class="math">${result.compact}</span></span>
        </div>
        <button class="btn tip show-steps" type="button">Schritte anzeigen</button>
        <div class="steps-list" hidden>${stepsHtml}</div>
      </div>`;
    }

    // Nächste Aufgabe freischalten
    const next = document.getElementById('task-' + (ti+1));
    if(next){
      next.classList.remove('locked');
      setTimeout(() => {
        const nextInput = next.querySelector('.ans-input');
        if(nextInput) nextInput.focus({preventScroll:false});
        next.scrollIntoView({behavior:'smooth', block:'center'});
      }, 300);
    } else {
      if(state[id].solved.size === c.tasks.length){
        const banner = document.getElementById('complete-banner');
        banner.classList.add('show');
        setTimeout(()=>banner.scrollIntoView({behavior:'smooth',block:'center'}), 350);
      }
    }
  } else {
    input.classList.add('bad');
    feedback.textContent = 'Noch nicht — probier es nochmal!';
    feedback.className = 'feedback bad';
    streak = 0;
    document.getElementById('streak-count').textContent = streak;
  }
}

function submitTest(id, c){
  let correct = 0;
  const taskEls = document.querySelectorAll('#task-list .task');
  const detail = [];
  taskEls.forEach((el, i) => {
    const t = c.tasks[i];
    const inp = el.querySelector('.ans-input');
    const fb = el.querySelector('.feedback:not(.eq-feedback)');
    const val = inp.value;
    inp.disabled = true;
    if(val.trim() && checkAnswer(val, t.answer).ok){
      correct++;
      inp.classList.add('good');
      fb.textContent = '✓ Richtig';
      fb.className = 'feedback ok';
      el.classList.add('solved');
      detail.push({i:i+1, kind:t.kind, ok:true});
    } else {
      inp.classList.add('bad');
      fb.textContent = val.trim() ? '✗ Leider falsch' : '✗ Keine Antwort';
      fb.className = 'feedback bad';
      detail.push({i:i+1, kind:t.kind, ok:false});
    }
  });
  const submitBtn = document.getElementById('submit-test');
  submitBtn.disabled = true;
  submitBtn.textContent = '✓ Test abgegeben';
  const total = c.tasks.length;
  const pct = Math.round(correct/total*100);
  let emoji = '🌱', label = 'Übe nochmal in den Stationen';
  if(pct >= 90){emoji='🏆'; label='Phänomenal — du beherrschst den Stoff!'}
  else if(pct >= 75){emoji='🌟'; label='Sehr gut! Nur Feinschliff fehlt.'}
  else if(pct >= 50){emoji='💪'; label='Solide Basis — schau dir die Fehler nochmal an.'}
  const wrongList = detail.filter(d=>!d.ok);
  document.getElementById('test-result').innerHTML = `
    <div class="test-summary">
      <div class="ts-emoji">${emoji}</div>
      <div class="ts-score">${correct} / ${total}</div>
      <div class="ts-pct">${pct}% richtig</div>
      <div class="ts-label">${label}</div>
      ${wrongList.length ? `
        <div class="ts-wrong">
          <strong>Diese Aufgaben solltest du nochmal anschauen:</strong>
          <ul>${wrongList.map(d => `<li>Aufgabe ${d.i}: <em>${d.kind}</em></li>`).join('')}</ul>
        </div>
      ` : '<p style="margin-top:14px">Alle richtig — Wahnsinn! 🎉</p>'}
    </div>
  `;
  if(correct === total){
    for(let i = 0; i < total; i++) state[id].solved.add(i);
  }
  refreshHomeProgress();
  document.getElementById('complete-banner').classList.add('show');
  setTimeout(()=>document.getElementById('test-result').scrollIntoView({behavior:'smooth',block:'center'}), 350);
  if(pct >= 75) confettiBurst(submitBtn, 60);
}

function goHome(){
  stopGlobalTimer();
  currentChapterId = null;
  document.getElementById('view-chapter').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  // Inhalt freigeben (verhindert dass alte DOM-Bäume im Speicher bleiben)
  document.getElementById('chapter-content').innerHTML = '';
  window.scrollTo({top:0});
  refreshHomeProgress();
}

document.getElementById('back-btn').addEventListener('click', goHome);

/* =====================================================================
   CONFETTI auf Canvas (eine Animation für alle Partikel)
   ===================================================================== */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettiParticles = [];
let confettiRunning = false;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas, {passive:true});

function confettiBurst(originEl, count){
  const rect = originEl.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + 20;
  const colors = ['#a855f7','#ec4899','#22d3ee','#fbbf24','#34d399'];
  const n = count || 18;
  for(let i = 0; i < n; i++){
    confettiParticles.push({
      x: cx + (Math.random()-0.5)*rect.width*0.6,
      y: cy,
      vx: (Math.random()-0.5)*4,
      vy: -Math.random()*4 - 2,
      g: 0.18,
      size: 4 + Math.random()*4,
      color: colors[(Math.random()*colors.length)|0],
      rot: Math.random()*Math.PI*2,
      vr: (Math.random()-0.5)*0.2,
      life: 0
    });
  }
  if(!confettiRunning){
    confettiRunning = true;
    requestAnimationFrame(animateConfetti);
  }
}

function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i = confettiParticles.length-1; i >= 0; i--){
    const p = confettiParticles[i];
    p.vy += p.g;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life++;
    if(p.y > canvas.height + 20 || p.life > 200){
      confettiParticles.splice(i,1);
      continue;
    }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    ctx.restore();
  }
  if(confettiParticles.length > 0){
    requestAnimationFrame(animateConfetti);
  } else {
    confettiRunning = false;
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

/* ===================================================================== */
buildHome();
